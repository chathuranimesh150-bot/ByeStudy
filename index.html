<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bye-Study | Professional Learning Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
        }

        /* Unique Sidebar Colors */
        .tab-dashboard.active-tab { background-color: #ff4d4d !important; color: black !important; border: 2px solid #000; }
        .tab-analytics.active-tab { background-color: #ffcc00 !important; color: black !important; border: 2px solid #000; }
        .tab-notes.active-tab { background-color: #33cc33 !important; color: black !important; border: 2px solid #000; }
        .tab-ai.active-tab { background-color: #3399ff !important; color: black !important; border: 2px solid #000; }
        .tab-tasks.active-tab { background-color: #ff9933 !important; color: black !important; border: 2px solid #000; }

        .sidebar-btn {
            transition: all 0.2s ease;
            font-weight: 800; /* Extra Bold */
            color: #64748b;
        }

        .sidebar-btn.active-tab span, .sidebar-btn.active-tab i {
            color: black !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        @media (max-width: 768px) {
            .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100; border-top: 1px solid #e5e7eb; }
            main { padding-bottom: 80px; }
            .sidebar-btn span { font-size: 10px; }
        }

        /* Mobile specific timer visibility */
        @media (max-width: 768px) {
            #mobile-timer-container { display: flex !important; }
            #desktop-timer-container { display: none !important; }
        }

        /* Image Preview Style */
        #photo-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid #e2e8f0;
        }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-900">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-white z-[500] flex items-center justify-center p-4 overflow-y-auto">
        <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8 md:p-10 space-y-6 my-auto">
            <div class="text-center space-y-2">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg mx-auto mb-4">B</div>
                <h1 class="text-3xl font-black uppercase tracking-tight">Join Bye-Study</h1>
                <p class="text-slate-400 font-bold text-sm uppercase">Set up your profile</p>
            </div>

            <div class="space-y-4">
                <div class="flex flex-col items-center space-y-3 mb-4">
                    <img id="photo-preview" src="https://ui-avatars.com/api/?name=User&background=f1f5f9&color=cbd5e1" alt="Preview">
                    <label class="cursor-pointer bg-slate-100 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                        Upload Photo (Optional)
                        <input type="file" id="user-photo" class="hidden" accept="image/*" onchange="previewImage(this, 'photo-preview')">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="login-fname" placeholder="FIRST NAME" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="login-lname" placeholder="LAST NAME" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <select id="login-district" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                    <option value="" disabled selected>SELECT DISTRICT</option>
                    <option value="Ampara">Ampara</option>
                    <option value="Anuradhapura">Anuradhapura</option>
                    <option value="Badulla">Badulla</option>
                    <option value="Batticaloa">Batticaloa</option>
                    <option value="Colombo">Colombo</option>
                    <option value="Galle">Galle</option>
                    <option value="Gampaha">Gampaha</option>
                    <option value="Hambantota">Hambantota</option>
                    <option value="Jaffna">Jaffna</option>
                    <option value="Kalutara">Kalutara</option>
                    <option value="Kandy">Kandy</option>
                    <option value="Kegalle">Kegalle</option>
                    <option value="Kilinochchi">Kilinochchi</option>
                    <option value="Kurunegala">Kurunegala</option>
                    <option value="Mannar">Mannar</option>
                    <option value="Matale">Matale</option>
                    <option value="Matara">Matara</option>
                    <option value="Moneragala">Moneragala</option>
                    <option value="Mullaitivu">Mullaitivu</option>
                    <option value="Nuwara Eliya">Nuwara Eliya</option>
                    <option value="Polonnaruwa">Polonnaruwa</option>
                    <option value="Puttalam">Puttalam</option>
                    <option value="Ratnapura">Ratnapura</option>
                    <option value="Trincomalee">Trincomalee</option>
                    <option value="Vavuniya">Vavuniya</option>
                </select>

                <input type="text" id="login-school" placeholder="SCHOOL NAME" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-black transform transition-active active:scale-95">
                    Start Learning
                </button>
            </div>
        </div>
    </div>

    <!-- Main App Container (Hidden initially) -->
    <div id="main-app" class="h-screen flex flex-col md:flex-row overflow-hidden hidden">
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex w-64 lg:w-72 bg-white border-r border-slate-200 flex-col p-6 space-y-8 flex-shrink-0">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg">B</div>
                <span class="text-2xl font-extrabold tracking-tight">Bye-Study</span>
            </div>

            <nav class="flex-1 space-y-3 overflow-y-auto">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="sidebar-btn tab-dashboard w-full flex items-center space-x-3 px-4 py-4 rounded-xl">
                    <i class="fas fa-th-large w-5"></i><span class="uppercase text-xs tracking-widest">Dashboard</span>
                </button>
                <button onclick="switchTab('tasks')" id="nav-tasks" class="sidebar-btn tab-tasks w-full flex items-center space-x-3 px-4 py-4 rounded-xl">
                    <i class="fas fa-calendar-check w-5"></i><span class="uppercase text-xs tracking-widest">Planner</span>
                </button>
                <button onclick="switchTab('analytics')" id="nav-analytics" class="sidebar-btn tab-analytics w-full flex items-center space-x-3 px-4 py-4 rounded-xl">
                    <i class="fas fa-chart-bar w-5"></i><span class="uppercase text-xs tracking-widest">Analytics</span>
                </button>
                <button onclick="switchTab('notes')" id="nav-notes" class="sidebar-btn tab-notes w-full flex items-center space-x-3 px-4 py-4 rounded-xl">
                    <i class="fas fa-file-alt w-5"></i><span class="uppercase text-xs tracking-widest">Notes</span>
                </button>
                <button onclick="switchTab('ai')" id="nav-ai" class="sidebar-btn tab-ai w-full flex items-center space-x-3 px-4 py-4 rounded-xl">
                    <i class="fas fa-robot w-5"></i><span class="uppercase text-xs tracking-widest">AI Tutor</span>
                </button>
            </nav>

            <!-- Desktop Focus Timer -->
            <div id="desktop-timer-container" class="bg-slate-900 rounded-2xl p-5 text-white">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Focus Timer</p>
                <div class="flex justify-between items-end">
                    <span class="text-2xl font-black focus-time-display">00:00</span>
                    <button onclick="toggleFocus()" class="focus-btn-toggle bg-blue-600 p-2 rounded-lg hover:bg-blue-500 transition-colors">
                        <i class="fas fa-play"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Mobile Navigation (Bottom Bar) -->
        <nav class="md:hidden mobile-nav bg-white flex justify-around items-center p-2 shadow-inner">
            <button onclick="switchTab('dashboard')" id="m-nav-dashboard" class="flex flex-col items-center p-2 text-slate-400"><i class="fas fa-th-large text-lg"></i><span class="text-[10px] font-bold">Dash</span></button>
            <button onclick="switchTab('tasks')" id="m-nav-tasks" class="flex flex-col items-center p-2 text-slate-400"><i class="fas fa-calendar-check text-lg"></i><span class="text-[10px] font-bold">Plan</span></button>
            <button onclick="switchTab('analytics')" id="m-nav-analytics" class="flex flex-col items-center p-2 text-slate-400"><i class="fas fa-chart-bar text-lg"></i><span class="text-[10px] font-bold">Stats</span></button>
            <button onclick="switchTab('notes')" id="m-nav-notes" class="flex flex-col items-center p-2 text-slate-400"><i class="fas fa-file-alt text-lg"></i><span class="text-[10px] font-bold">Note</span></button>
            <button onclick="switchTab('ai')" id="m-nav-ai" class="flex flex-col items-center p-2 text-slate-400"><i class="fas fa-robot text-lg"></i><span class="text-[10px] font-bold">AI</span></button>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-4 md:px-8 flex-shrink-0">
                <h2 id="current-tab-title" class="text-sm md:text-xl font-extrabold uppercase tracking-tight truncate">Dashboard</h2>
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <!-- Mobile Focus Timer (In Header) -->
                    <div id="mobile-timer-container" class="hidden items-center bg-slate-100 px-3 py-1.5 rounded-full space-x-2">
                        <span class="text-xs font-black focus-time-display">00:00</span>
                        <button onclick="toggleFocus()" class="focus-btn-toggle text-blue-600">
                            <i class="fas fa-play text-xs"></i>
                        </button>
                    </div>

                    <div class="flex items-center space-x-2 md:space-x-3 pl-2 border-l border-slate-100">
                        <div class="hidden sm:block text-right leading-tight">
                            <p id="header-user-name" class="text-xs md:text-sm font-black truncate max-w-[120px]">User Name</p>
                            <p id="header-user-school" class="text-[8px] md:text-[9px] text-slate-400 uppercase font-bold tracking-widest truncate max-w-[120px]">School Name</p>
                        </div>
                        <div class="relative group cursor-pointer">
                            <img id="header-user-photo" src="https://ui-avatars.com/api/?name=User&background=000&color=fff" class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-slate-100 shadow-sm object-cover">
                            <label class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer">
                                <i class="fas fa-camera text-white text-[10px]"></i>
                                <input type="file" class="hidden" accept="image/*" onchange="previewImage(this, 'header-user-photo', true)">
                            </label>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-10 bg-[#fcfcfd]" id="content-area">
                
                <!-- Dashboard Section -->
                <div id="tab-dashboard" class="space-y-6 md:space-y-8 block">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                        <!-- Progress Card -->
                        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8 gap-4">
                                <h3 class="font-black text-lg uppercase tracking-tight">Subject Progress</h3>
                                <select id="overview-filter" onchange="renderDashboardChart()" class="w-full sm:w-auto text-xs font-bold bg-slate-100 border-none p-2 rounded-lg outline-none">
                                    <option value="all">Compare All</option>
                                </select>
                            </div>
                            <div class="h-[250px] md:h-[300px]">
                                <canvas id="overviewChart"></canvas>
                            </div>
                        </div>

                        <!-- Marks Form -->
                        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                            <h3 class="font-black text-lg uppercase mb-6 tracking-tight">New Record</h3>
                            <div class="space-y-4">
                                <input type="text" id="subject-name" placeholder="SUBJECT NAME" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold placeholder:text-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <input type="number" id="subject-score" placeholder="SCORE %" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold placeholder:text-slate-300 outline-none">
                                    <input type="color" id="subject-color" value="#000000" class="w-full h-[58px] p-2 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer">
                                </div>
                                <button onclick="saveMark()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-black transition-all">
                                    Save Mark
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Planner/Tasks Section -->
                <div id="tab-tasks" class="hidden space-y-6">
                     <div class="w-full max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-3xl border border-slate-100">
                        <h3 class="font-black text-lg uppercase mb-6 tracking-tight">Study Planner</h3>
                        <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 mb-6">
                            <input type="text" id="task-input" placeholder="WHAT NEEDS TO BE DONE?" class="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none">
                            <button onclick="addTask()" class="bg-slate-900 text-white px-6 py-4 sm:py-0 rounded-2xl font-black">ADD</button>
                        </div>
                        <ul id="task-list" class="space-y-3"></ul>
                    </div>
                </div>

                <!-- Analytics Section -->
                <div id="tab-analytics" class="hidden">
                    <div id="subject-groups-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <!-- Notes Section -->
                <div id="tab-notes" class="hidden space-y-6">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h3 class="text-xl font-black uppercase tracking-tight">Your Notes</h3>
                        <button onclick="openNoteModal()" class="w-full sm:w-auto bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-xs uppercase">New Note</button>
                    </div>
                    <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <!-- AI Tutor Section -->
                <div id="tab-ai" class="hidden h-full flex flex-col max-w-4xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                    <div class="p-4 md:p-6 bg-slate-900 text-white flex items-center space-x-4">
                        <div class="w-10 h-10 md:w-12 md:h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl md:text-2xl">
                            <i class="fas fa-brain"></i>
                        </div>
                        <div>
                            <h4 class="font-black uppercase text-xs md:text-sm">Bye-Study AI</h4>
                            <p class="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase">Specialist</p>
                        </div>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 bg-slate-50"></div>
                    <div class="p-4 md:p-6 bg-white border-t border-slate-100 flex items-center space-x-2 md:space-x-4">
                        <input type="text" id="chat-input" placeholder="Ask..." class="flex-1 p-3 md:p-4 bg-slate-50 rounded-2xl font-bold outline-none text-sm md:text-base">
                        <button onclick="sendMessage()" class="bg-slate-900 text-white w-10 h-10 md:w-14 md:h-14 rounded-2xl flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-paper-plane text-sm md:text-base"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 md:p-8 shadow-2xl space-y-6">
            <h4 class="text-xl font-black uppercase">Create Note</h4>
            <input type="text" id="note-title" placeholder="TITLE" class="w-full p-4 bg-slate-50 rounded-xl border font-bold outline-none">
            <textarea id="note-body" rows="6" placeholder="CONTENT..." class="w-full p-4 bg-slate-50 rounded-xl border font-bold outline-none resize-none"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="saveNote()" class="bg-slate-900 text-white py-4 rounded-xl font-black uppercase">Save</button>
                <button onclick="closeNoteModal()" class="bg-slate-100 text-slate-500 py-4 rounded-xl font-black uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let marks = JSON.parse(localStorage.getItem('bye_marks')) || [];
        let notes = JSON.parse(localStorage.getItem('bye_notes')) || [];
        let tasks = JSON.parse(localStorage.getItem('bye_tasks')) || [];
        let userData = JSON.parse(localStorage.getItem('bye_user')) || null;
        let mainChart = null;

        const DEFAULT_PHOTO = "https://ui-avatars.com/api/?name=User&background=f1f5f9&color=cbd5e1";

        window.onload = () => {
            if (userData) {
                applyUserData();
                showMainApp();
            }
            updateFilterOptions();
            renderDashboardChart();
            renderSubjectGroups();
            renderNotes();
            renderTasks();
            switchTab('dashboard');
        };

        // --- LOGIN & USER DATA ---
        function previewImage(input, targetId, updateStorage = false) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(targetId).src = e.target.result;
                    if (updateStorage && userData) {
                        userData.photo = e.target.result;
                        localStorage.setItem('bye_user', JSON.stringify(userData));
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLogin() {
            const fname = document.getElementById('login-fname').value.trim();
            const lname = document.getElementById('login-lname').value.trim();
            const district = document.getElementById('login-district').value;
            const school = document.getElementById('login-school').value.trim();
            const photoSrc = document.getElementById('photo-preview').src;

            if (!fname || !lname || !district || !school) {
                alert("Please fill in all details (District selection is required)");
                return;
            }

            userData = {
                firstName: fname,
                lastName: lname,
                district: district,
                school: school,
                photo: photoSrc === DEFAULT_PHOTO ? null : photoSrc
            };

            localStorage.setItem('bye_user', JSON.stringify(userData));
            applyUserData();
            showMainApp();
        }

        function applyUserData() {
            const fullName = `${userData.firstName} ${userData.lastName}`;
            document.getElementById('header-user-name').innerText = fullName;
            document.getElementById('header-user-school').innerText = userData.school;
            
            // Set photo or fallback
            const finalPhoto = userData.photo || `https://ui-avatars.com/api/?name=${userData.firstName}+${userData.lastName}&background=000&color=fff`;
            document.getElementById('header-user-photo').src = finalPhoto;
        }

        function showMainApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        function switchTab(tabId) {
            const tabs = ['dashboard', 'tasks', 'analytics', 'notes', 'ai'];
            tabs.forEach(t => {
                const desktopNav = document.getElementById(`nav-${t}`);
                const mobileNav = document.getElementById(`m-nav-${t}`);
                const section = document.getElementById(`tab-${t}`);
                
                if (section) section.classList.add('hidden');
                if(desktopNav) desktopNav.classList.remove('active-tab');
                if(mobileNav) {
                    mobileNav.classList.remove('text-slate-900');
                    mobileNav.classList.add('text-slate-400');
                    mobileNav.style.backgroundColor = 'transparent';
                    mobileNav.style.borderRadius = '0';
                }
            });

            const currentSection = document.getElementById(`tab-${tabId}`);
            if (currentSection) currentSection.classList.remove('hidden');
            
            const activeDesktop = document.getElementById(`nav-${tabId}`);
            if(activeDesktop) activeDesktop.classList.add('active-tab');

            const activeMobile = document.getElementById(`m-nav-${tabId}`);
            if(activeMobile) {
                activeMobile.classList.remove('text-slate-400');
                activeMobile.classList.add('text-slate-900');
                const colors = { 'dashboard': '#ff4d4d', 'tasks': '#ff9933', 'analytics': '#ffcc00', 'notes': '#33cc33', 'ai': '#3399ff' };
                activeMobile.style.backgroundColor = colors[tabId];
                activeMobile.style.borderRadius = '12px';
            }

            const titles = { 'dashboard': 'Dashboard Overview', 'tasks': 'Study Planner', 'analytics': 'Subject Analysis', 'notes': 'My Study Notes', 'ai': 'AI Learning Tutor' };
            document.getElementById('current-tab-title').innerText = titles[tabId];
        }

        // --- MARKS ---
        function saveMark() {
            const name = document.getElementById('subject-name').value.trim();
            const score = parseInt(document.getElementById('subject-score').value);
            const color = document.getElementById('subject-color').value;
            if(!name || isNaN(score)) return;

            marks.push({ id: Date.now(), subject: name.toUpperCase(), score, color, date: new Date().toLocaleDateString() });
            localStorage.setItem('bye_marks', JSON.stringify(marks));
            
            document.getElementById('subject-name').value = '';
            document.getElementById('subject-score').value = '';
            
            updateFilterOptions();
            renderDashboardChart();
            renderSubjectGroups();
        }

        function updateFilterOptions() {
            const select = document.getElementById('overview-filter');
            if (!select) return;
            const subjects = [...new Set(marks.map(m => m.subject))];
            select.innerHTML = '<option value="all">Compare All</option>' + subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderDashboardChart() {
            const canvas = document.getElementById('overviewChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const filter = document.getElementById('overview-filter').value;
            if(mainChart) mainChart.destroy();

            let labels, data, colors;
            if(filter === 'all') {
                const grouped = marks.reduce((acc, curr) => {
                    if(!acc[curr.subject]) acc[curr.subject] = { sum: 0, count: 0, color: curr.color };
                    acc[curr.subject].sum += curr.score;
                    acc[curr.subject].count++;
                    return acc;
                }, {});
                labels = Object.keys(grouped);
                data = labels.map(l => (grouped[l].sum / grouped[l].count).toFixed(0));
                colors = labels.map(l => grouped[l].color);
            } else {
                const filtered = marks.filter(m => m.subject === filter);
                labels = filtered.map(m => m.date);
                data = filtered.map(m => m.score);
                colors = filtered.length > 0 ? filtered[0].color : '#000';
            }

            mainChart = new Chart(ctx, {
                type: filter === 'all' ? 'bar' : 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Score %',
                        data,
                        backgroundColor: colors,
                        borderColor: filter === 'all' ? 'transparent' : colors,
                        borderRadius: 8,
                        tension: 0.4
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, max: 100, ticks: { font: { weight: 'bold' } } },
                        x: { ticks: { font: { weight: 'bold' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderSubjectGroups() {
            const container = document.getElementById('subject-groups-container');
            if (!container) return;
            const subjects = [...new Set(marks.map(m => m.subject))];
            if(subjects.length === 0) {
                container.innerHTML = '<div class="col-span-full py-10 text-center font-bold text-slate-400">NO DATA YET. ADD MARKS IN DASHBOARD.</div>';
                return;
            }
            container.innerHTML = subjects.map(sub => {
                const subMarks = marks.filter(m => m.subject === sub);
                const avg = (subMarks.reduce((a, b) => a + b.score, 0) / subMarks.length).toFixed(0);
                const themeColor = subMarks[0].color;
                return `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm" style="border-top: 4px solid ${themeColor}">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-black text-lg">${sub}</h4>
                            <span class="px-3 py-1 bg-slate-900 text-white text-xs rounded-full font-black">${avg}% AVG</span>
                        </div>
                        <div class="space-y-2 max-h-40 overflow-y-auto">
                            ${subMarks.slice().reverse().map(m => `<div class="flex justify-between text-xs font-bold bg-slate-50 p-2 rounded-lg"><span>${m.date}</span><span style="color:${themeColor}">${m.score}%</span></div>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- TASKS ---
        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value.trim()) return;
            tasks.push({ id: Date.now(), text: input.value.toUpperCase(), done: false });
            localStorage.setItem('bye_tasks', JSON.stringify(tasks));
            input.value = '';
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            if (!list) return;
            if(tasks.length === 0) {
                list.innerHTML = '<div class="py-10 text-center font-bold text-slate-400">YOUR PLANNER IS EMPTY.</div>';
                return;
            }
            list.innerHTML = tasks.map(t => `
                <li class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white transition-all shadow-sm">
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" class="w-5 h-5 rounded-lg accent-slate-900">
                        <span class="font-bold text-sm md:text-base ${t.done ? 'line-through text-slate-400' : ''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${t.id})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
                </li>
            `).join('');
        }
        function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t); localStorage.setItem('bye_tasks', JSON.stringify(tasks)); renderTasks(); }
        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); localStorage.setItem('bye_tasks', JSON.stringify(tasks)); renderTasks(); }

        // --- NOTES ---
        function openNoteModal() { document.getElementById('note-modal').style.display = 'flex'; }
        function closeNoteModal() { document.getElementById('note-modal').style.display = 'none'; }
        function saveNote() {
            const title = document.getElementById('note-title').value.trim();
            const body = document.getElementById('note-body').value.trim();
            if(!title || !body) return;
            notes.unshift({ id: Date.now(), title: title.toUpperCase(), body, date: new Date().toLocaleDateString() });
            localStorage.setItem('bye_notes', JSON.stringify(notes));
            renderNotes();
            closeNoteModal();
            document.getElementById('note-title').value = '';
            document.getElementById('note-body').value = '';
        }
        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            if (!grid) return;
            if(notes.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-10 text-center font-bold text-slate-400">NO NOTES SAVED.</div>';
                return;
            }
            grid.innerHTML = notes.map(n => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase">${n.date}</p>
                        <button onclick="deleteNote(${n.id})" class="text-slate-300 hover:text-red-400"><i class="fas fa-times"></i></button>
                    </div>
                    <h4 class="font-black text-lg mb-2">${n.title}</h4>
                    <p class="text-xs font-bold text-slate-500 leading-relaxed line-clamp-4">${n.body}</p>
                </div>
            `).join('');
        }
        function deleteNote(id) { notes = notes.filter(n => n.id !== id); localStorage.setItem('bye_notes', JSON.stringify(notes)); renderNotes(); }

        // --- AI ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            addMsg('user', text.toUpperCase());
            input.value = '';
            setTimeout(() => addMsg('bot', 'AI ANALYST: STAY CONSISTENT. YOUR DATA SHOWS GOOD PROGRESS. NEED HELP WITH A SPECIFIC SUBJECT?'), 600);
        }
        function addMsg(role, text) {
            const container = document.getElementById('chat-messages');
            if (!container) return;
            container.innerHTML += `<div class="flex ${role === 'user' ? 'justify-end' : 'justify-start'}"><div class="${role === 'user' ? 'bg-slate-900 text-white' : 'bg-white border'} p-4 rounded-2xl font-black text-xs md:text-sm max-w-[85%] shadow-sm">${text}</div></div>`;
            container.scrollTop = container.scrollHeight;
        }

        // --- TIMER ---
        let timerActive = false; let sec = 0; let interval;
        function toggleFocus() {
            timerActive = !timerActive;
            const btns = document.querySelectorAll('.focus-btn-toggle');
            const displays = document.querySelectorAll('.focus-time-display');
            
            if(timerActive) {
                btns.forEach(b => b.innerHTML = '<i class="fas fa-pause"></i>');
                interval = setInterval(() => { 
                    sec++; 
                    const m = Math.floor(sec/60); 
                    const s = sec%60; 
                    const timeStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    displays.forEach(d => d.innerText = timeStr);
                }, 1000);
            } else {
                btns.forEach(b => b.innerHTML = '<i class="fas fa-play"></i>');
                clearInterval(interval);
            }
        }
    </script>
</body>
</html>
